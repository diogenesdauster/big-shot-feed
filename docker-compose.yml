services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: bigshot_feed
      POSTGRES_PASSWORD: bigshot_feed_local
      POSTGRES_DB: bigshot_feed
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bigshot_feed"]
      interval: 5s
      timeout: 5s
      retries: 5

  feed:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://bigshot_feed:bigshot_feed_local@postgres:5432/bigshot_feed
      PORT: 3001
      ADMIN_API_KEY: local_dev_key_at_least_16_chars
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      CRON_SCHEDULE: "0 * * * *"
      DRY_RUN: "false"
      LOG_LEVEL: info
    ports:
      - "3001:3001"

volumes:
  pgdata:
